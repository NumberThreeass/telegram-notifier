name: Список дел на день

on:
  schedule:
    - cron: '0 8 * * *'          # каждый день в 8:00 UTC
  workflow_dispatch:
    inputs:
      category:
        description: 'Категория задач'
        required: false
        default: 'ежедневные'
        type: choice
        options:
          - ежедневные
          - учебные
          - личные

jobs:
  send-todo:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем репозиторий
        uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ========== ДИАГНОСТИКА: проверяем секреты ==========
      - name: 🔍 Проверка секретов Telegram
        run: |
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "✅ TELEGRAM_CHAT_ID задан: ${{ secrets.TELEGRAM_CHAT_ID }}"
          else
            echo "❌ TELEGRAM_CHAT_ID НЕ ЗАДАН или пуст!"
          fi
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "✅ TELEGRAM_BOT_TOKEN задан (первые 5 символов: ${{ secrets.TELEGRAM_BOT_TOKEN }}...)"
          else
            echo "❌ TELEGRAM_BOT_TOKEN НЕ ЗАДАН или пуст!"
          fi

      - name: Формируем список задач
        id: tasks
        run: |
          CATEGORY="${{ github.event.inputs.category || 'ежедневные' }}"
          if ! jq -e ".\"$CATEGORY\"" tasks.json > /dev/null 2>&1; then
            echo "❌ Категория '$CATEGORY' не найдена в tasks.json"
            exit 1
          fi
          TASKS=$(jq -r ".\"$CATEGORY\"" tasks.json)
          # Собираем сообщение с HTML-форматированием
          MESSAGE="<b>СПИСОК ДЕЛ НА СЕГОДНЯ</b>%0AКатегория: $CATEGORY%0A%0A<b>Задачи:</b>"
          while IFS= read -r task; do
            MESSAGE="$MESSAGE%0A• $task"
          done <<< "$(echo "$TASKS" | jq -r '.[]')"
          MESSAGE="$MESSAGE%0A%0A<i>Отмечайте выполненные задачи!</i>"
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      # ========== ОТПРАВКА С ДИАГНОСТИКОЙ ==========
      - name: 📨 Отправляем в Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$CHAT_ID" ]; then
            echo "❌ ОШИБКА: CHAT_ID пуст. Проверьте секрет TELEGRAM_CHAT_ID"
            exit 1
          fi
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ ОШИБКА: BOT_TOKEN пуст. Проверьте секрет TELEGRAM_BOT_TOKEN"
            exit 1
          fi
          MESSAGE="${{ steps.tasks.outputs.message }}"
          if [ -z "$MESSAGE" ]; then
            echo "❌ ОШИБКА: сообщение пустое"
            exit 1
          fi
          echo "Отправляем сообщение в чат $CHAT_ID..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP код ответа: $HTTP_CODE"
          echo "Тело ответа Telegram: $BODY"
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Сообщение успешно отправлено!"
          else
            echo "❌ Ошибка отправки. Код: $HTTP_CODE"
            exit 1
          fi