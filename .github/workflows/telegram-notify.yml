name: Telegram Notifications

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.x'

jobs:
  build-and-test:
    name: Сборка и тестирование
    runs-on: ubuntu-latest

    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      - name: Устанавливаем .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Восстанавливаем пакеты
        run: dotnet restore

      - name: Собираем проект
        run: dotnet build --configuration Release --no-restore

      - name: Запускаем тесты
        id: tests
        run: dotnet test --configuration Release --no-build --verbosity normal
        continue-on-error: true

      # ========== ДИАГНОСТИКА: проверяем секреты ==========
      - name: 🔍 Проверка секретов Telegram
        run: |
          echo "=== TELEGRAM_CHAT_ID ==="
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "✅ Секрет задан, значение: ${{ secrets.TELEGRAM_CHAT_ID }}"
          else
            echo "❌ Секрет TELEGRAM_CHAT_ID НЕ ЗАДАН или пуст!"
          fi
          echo "=== TELEGRAM_BOT_TOKEN ==="
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "✅ Секрет задан (первые 5 символов: ${{ secrets.TELEGRAM_BOT_TOKEN }}...)"
          else
            echo "❌ Секрет TELEGRAM_BOT_TOKEN НЕ ЗАДАН или пуст!"
          fi

      # ========== УВЕДОМЛЕНИЕ (вариант 1: через curl с полным выводом) ==========
      # Этот вариант надёжнее для диагностики, так как показывает ответ Telegram API
      - name: 📨 Уведомление об успехе (curl)
        if: steps.tests.outcome == 'success'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$CHAT_ID" ]; then
            echo "❌ ОШИБКА: CHAT_ID пуст. Проверьте секрет TELEGRAM_CHAT_ID"
            exit 1
          fi
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ ОШИБКА: BOT_TOKEN пуст. Проверьте секрет TELEGRAM_BOT_TOKEN"
            exit 1
          fi
          MESSAGE="✅ CI/CD Pipeline - УСПЕШНО!%0A%0A📦 Репозиторий: ${{ github.repository }}%0A👤 Автор: ${{ github.actor }}%0A🌿 Ветка: ${{ github.ref_name }}%0A🔖 Коммит: ${{ github.sha }}%0A⏱️ Время: ${{ github.run_started_at }}%0A%0AВсе тесты пройдены!"
          echo "Отправляем сообщение в чат $CHAT_ID..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP код ответа: $HTTP_CODE"
          echo "Тело ответа Telegram: $BODY"
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Сообщение успешно отправлено!"
          else
            echo "❌ Ошибка отправки. Код: $HTTP_CODE"
            exit 1
          fi

      - name: 📨 Уведомление об ошибке (curl)
        if: steps.tests.outcome != 'success'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$CHAT_ID" ]; then
            echo "❌ ОШИБКА: CHAT_ID пуст. Проверьте секрет TELEGRAM_CHAT_ID"
            exit 1
          fi
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ ОШИБКА: BOT_TOKEN пуст. Проверьте секрет TELEGRAM_BOT_TOKEN"
            exit 1
          fi
          MESSAGE="❌ CI/CD Pipeline - НЕ УДАЛОСЬ!%0A%0A📦 Репозиторий: ${{ github.repository }}%0A👤 Автор: ${{ github.actor }}%0A🌿 Ветка: ${{ github.ref_name }}%0A🔖 Коммит: ${{ github.sha }}%0A⏱️ Время: ${{ github.run_started_at }}%0A%0AПроверьте логи на вкладке Actions!"
          echo "Отправляем сообщение в чат $CHAT_ID..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP код ответа: $HTTP_CODE"
          echo "Тело ответа Telegram: $BODY"
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Сообщение успешно отправлено!"
          else
            echo "❌ Ошибка отправки. Код: $HTTP_CODE"
            exit 1
          fi