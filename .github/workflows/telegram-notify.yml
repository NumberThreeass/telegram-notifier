name: Telegram Notifications

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.x'

jobs:
  build-and-test:
    name: Сборка и тестирование
    runs-on: ubuntu-latest

    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      - name: Устанавливаем .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Восстанавливаем пакеты
        run: dotnet restore

      - name: Собираем проект
        run: dotnet build --configuration Release --no-restore

      - name: Запускаем тесты
        id: tests
        run: dotnet test --configuration Release --no-build --verbosity normal
        continue-on-error: true

      - name: Уведомление об успехе
        if: steps.tests.outcome == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ CI/CD Pipeline - УСПЕШНО!
            
            📦 Репозиторий: ${{ github.repository }}
            👤 Автор: ${{ github.actor }}
            🌿 Ветка: ${{ github.ref_name }}
            🔖 Коммит: ${{ github.sha }}
            ⏱️ Время: ${{ github.run_started_at }}
            
            Все тесты пройдены!

      - name: Уведомление об ошибке
        if: steps.tests.outcome != 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ CI/CD Pipeline - НЕ УДАЛОСЬ!
            
            📦 Репозиторий: ${{ github.repository }}
            👤 Автор: ${{ github.actor }}
            🌿 Ветка: ${{ github.ref_name }}
            🔖 Коммит: ${{ github.sha }}
            ⏱️ Время: ${{ github.run_started_at }}
            
            Проверьте логи на вкладке Actions!