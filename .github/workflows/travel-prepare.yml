name: Подготовка к поездке

on:
  workflow_dispatch:
    inputs:
      travel_date:
        description: 'Дата поездки (ГГГГ-ММ-ДД)'
        required: true
        default: '2024-12-01'
        type: string

jobs:
  countdown:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      # ========== ДИАГНОСТИКА СЕКРЕТОВ ==========
      - name: 🔍 Проверка секретов Telegram
        run: |
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "✅ TELEGRAM_CHAT_ID задан: ${{ secrets.TELEGRAM_CHAT_ID }}"
          else
            echo "❌ TELEGRAM_CHAT_ID НЕ ЗАДАН или пуст!"
          fi
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "✅ TELEGRAM_BOT_TOKEN задан (первые 5 символов: ${{ secrets.TELEGRAM_BOT_TOKEN }}...)"
          else
            echo "❌ TELEGRAM_BOT_TOKEN НЕ ЗАДАН или пуст!"
          fi

      # ========== РАСЧЁТ ДНЕЙ ДО ПОЕЗДКИ ==========
      - name: Рассчитываем дни до поездки
        id: days
        run: |
          TRAVEL_DATE="${{ github.event.inputs.travel_date }}"
          if ! date -d "$TRAVEL_DATE" >/dev/null 2>&1; then
            echo "❌ Неверный формат даты: $TRAVEL_DATE. Используйте ГГГГ-ММ-ДД"
            exit 1
          fi
          TODAY=$(date +%s)
          TRAVEL=$(date -d "$TRAVEL_DATE" +%s)
          SECONDS_LEFT=$((TRAVEL - TODAY))
          DAYS_LEFT=$((SECONDS_LEFT / 86400))
          if [ $DAYS_LEFT -lt 0 ]; then
            echo "⚠️ Дата уже прошла! (дней: $DAYS_LEFT)"
            DAYS_LEFT=0
          fi
          echo "left=$DAYS_LEFT" >> $GITHUB_OUTPUT
          echo "✅ До поездки $DAYS_LEFT дней"

      # ========== ФОРМИРУЕМ ЧЕКЛИСТ (HTML) ==========
      - name: Формируем чеклист
        id: checklist
        run: |
          DAYS="${{ steps.days.outputs.left }}"
          if [ "$DAYS" -le 1 ] 2>/dev/null; then
            MSG="<b>🚀 ЗАВТРА ЕДЕМ!</b>%0A%0A• Собрать вещи%0A• Проверить документы%0A• Распечатать билеты%0A• Зарядить гаджеты"
          elif [ "$DAYS" -le 3 ] 2>/dev/null; then
            MSG="<b>✈️ Осталось $DAYS дня!</b>%0A%0A• Купить билеты%0A• Забронировать отель%0A• Обменять валюту%0A• Проверить паспорт"
          elif [ "$DAYS" -le 7 ] 2>/dev/null; then
            MSG="<b>📋 Осталось $DAYS дней</b>%0A%0A• Составить маршрут%0A• Изучить достопримечательности%0A• Купить страховку"
          else
            MSG="<b>🗓️ До поездки $DAYS дней</b>%0A%0A• Начать копить деньги%0A• Выбрать отель%0A• Посмотреть билеты"
          fi
          echo "text=$MSG" >> $GITHUB_OUTPUT

      # ========== ОТПРАВКА В TELEGRAM С ДИАГНОСТИКОЙ ==========
      - name: 📨 Отправляем в Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$CHAT_ID" ]; then
            echo "❌ ОШИБКА: CHAT_ID пуст. Проверьте секрет TELEGRAM_CHAT_ID"
            exit 1
          fi
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ ОШИБКА: BOT_TOKEN пуст. Проверьте секрет TELEGRAM_BOT_TOKEN"
            exit 1
          fi
          MESSAGE="${{ steps.checklist.outputs.text }}"
          if [ -z "$MESSAGE" ]; then
            echo "❌ ОШИБКА: сообщение пустое"
            exit 1
          fi
          echo "Отправляем сообщение в чат $CHAT_ID..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP код ответа: $HTTP_CODE"
          echo "Тело ответа Telegram: $BODY"
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Сообщение успешно отправлено!"
          else
            echo "❌ Ошибка отправки. Код: $HTTP_CODE"
            exit 1
          fi