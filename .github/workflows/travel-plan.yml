name: Планировщик путешествий

on:
  workflow_dispatch:
    inputs:
      destination:
        description: 'Город назначения'
        required: true
        default: 'москва'
        type: choice
        options:
          - москва
          - санкт-петербург
          - сочи
      days:
        description: 'Количество дней'
        required: true
        default: '3'
        type: string
      budget:
        description: 'Бюджет (руб)'
        required: true
        default: '30000'
        type: string
      season:
        description: 'Сезон'
        required: true
        default: 'лето'
        type: choice
        options:
          - лето
          - зима
          - весна-осень

jobs:
  generate-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      # ========== ДИАГНОСТИКА СЕКРЕТОВ ==========
      - name: 🔍 Проверка секретов
        run: |
          echo "=== TELEGRAM ==="
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "✅ TELEGRAM_CHAT_ID задан: ${{ secrets.TELEGRAM_CHAT_ID }}"
          else
            echo "❌ TELEGRAM_CHAT_ID НЕ ЗАДАН или пуст!"
          fi
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "✅ TELEGRAM_BOT_TOKEN задан (первые 5 символов: ${{ secrets.TELEGRAM_BOT_TOKEN }}...)"
          else
            echo "❌ TELEGRAM_BOT_TOKEN НЕ ЗАДАН или пуст!"
          fi
          echo "=== OPENWEATHER ==="
          if [ -n "${{ secrets.OPENWEATHER_API_KEY }}" ]; then
            echo "✅ OPENWEATHER_API_KEY задан (первые 5 символов: ${{ secrets.OPENWEATHER_API_KEY }}...)"
          else
            echo "❌ OPENWEATHER_API_KEY НЕ ЗАДАН или пуст!"
          fi

      - name: Устанавливаем yq и jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Проверяем наличие travel_config.yaml
        run: |
          if [ ! -f travel_config.yaml ]; then
            echo "❌ Файл travel_config.yaml не найден в корне репозитория!"
            exit 1
          fi
          echo "✅ travel_config.yaml найден"

      # ========== ПОГОДА ==========
      - name: Получаем погоду
        id: weather
        env:
          API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "❌ OPENWEATHER_API_KEY не задан, пропускаем погоду"
            echo "temp=—" >> $GITHUB_OUTPUT
            echo "description=нет данных" >> $GITHUB_OUTPUT
            exit 0
          fi
          CITY_ID=$(yq eval ".destinations.${{ github.event.inputs.destination }}.id" travel_config.yaml)
          if [ -z "$CITY_ID" ] || [ "$CITY_ID" = "null" ]; then
            echo "❌ Не найден city_id для ${{ github.event.inputs.destination }}"
            exit 1
          fi
          RESPONSE=$(curl -s "https://api.openweathermap.org/data/2.5/weather?id=$CITY_ID&appid=$API_KEY&units=metric&lang=ru")
          # Проверяем, не вернулась ли ошибка
          if echo "$RESPONSE" | jq -e '.cod != 200' > /dev/null 2>&1; then
            echo "❌ Ошибка OpenWeatherMap: $(echo "$RESPONSE" | jq -r '.message')"
            exit 1
          fi
          TEMP=$(echo "$RESPONSE" | jq -r '.main.temp')
          DESC=$(echo "$RESPONSE" | jq -r '.weather[0].description')
          echo "temp=$TEMP" >> $GITHUB_OUTPUT
          echo "description=$DESC" >> $GITHUB_OUTPUT
          echo "✅ Погода получена: $TEMP°C, $DESC"

      # ========== СПИСОК ВЕЩЕЙ ==========
      - name: Формируем список вещей
        id: packing
        run: |
          SEASON="${{ github.event.inputs.season }}"
          ITEMS=$(yq eval ".packing_lists.\"$SEASON\".обязательно[]" travel_config.yaml 2>/dev/null || true)
          if [ -z "$ITEMS" ]; then
            echo "❌ Сезон '$SEASON' не найден в packing_lists"
            exit 1
          fi
          PACKING=""
          while IFS= read -r item; do
            PACKING="${PACKING}• ${item}\n"
          done <<< "$ITEMS"
          echo "list=$PACKING" >> $GITHUB_OUTPUT

      # ========== БЮДЖЕТ ==========
      - name: Рассчитываем бюджет
        id: budget
        run: |
          DAYS=${{ github.event.inputs.days }}
          BUDGET=${{ github.event.inputs.budget }}
          TOTAL=$((8000 + 3000*DAYS + 1500*DAYS + 1000*DAYS))
          if [ $TOTAL -le $BUDGET ]; then
            STATUS="✅ Укладываемся в бюджет"
          else
            STATUS="⚠️ Превышаем бюджет на $((TOTAL - BUDGET)) руб"
          fi
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      # ========== СОВЕТЫ ==========
      - name: Получаем советы
        id: tips
        run: |
          TIPS=$(yq eval '.travel_tips.общие[]' travel_config.yaml)
          TIPS_TEXT=""
          while IFS= read -r tip; do
            TIPS_TEXT="${TIPS_TEXT}• ${tip}\n"
          done <<< "$TIPS"
          echo "text=$TIPS_TEXT" >> $GITHUB_OUTPUT

      # ========== ФОРМИРУЕМ СООБЩЕНИЕ (HTML) ==========
      - name: Формируем сообщение
        id: message
        run: |
          DEST="${{ github.event.inputs.destination }}"
          DAYS="${{ github.event.inputs.days }}"
          TEMP="${{ steps.weather.outputs.temp }}"
          DESC="${{ steps.weather.outputs.description }}"
          TOTAL="${{ steps.budget.outputs.total }}"
          STATUS="${{ steps.budget.outputs.status }}"
          PACKING="${{ steps.packing.outputs.list }}"
          TIPS="${{ steps.tips.outputs.text }}"

          MESSAGE="<b>✈️ ПЛАН ПУТЕШЕСТВИЯ В ${DEST^^}</b>%0A%0A"
          MESSAGE="${MESSAGE}📅 Длительность: ${DAYS} дней%0A"
          MESSAGE="${MESSAGE}🌤️ Погода: ${TEMP}°C, ${DESC}%0A%0A"
          MESSAGE="${MESSAGE}💰 Бюджет: ${TOTAL} руб%0A"
          MESSAGE="${MESSAGE}${STATUS}%0A%0A"
          MESSAGE="${MESSAGE}🎒 <b>Что взять:</b>%0A${PACKING}%0A"
          MESSAGE="${MESSAGE}💡 <b>Советы:</b>%0A${TIPS}"
          echo "full_message=$MESSAGE" >> $GITHUB_OUTPUT

      # ========== ОТПРАВКА В TELEGRAM С ДИАГНОСТИКОЙ ==========
      - name: 📨 Отправляем в Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$CHAT_ID" ]; then
            echo "❌ ОШИБКА: CHAT_ID пуст. Проверьте секрет TELEGRAM_CHAT_ID"
            exit 1
          fi
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ ОШИБКА: BOT_TOKEN пуст. Проверьте секрет TELEGRAM_BOT_TOKEN"
            exit 1
          fi
          MESSAGE="${{ steps.message.outputs.full_message }}"
          if [ -z "$MESSAGE" ]; then
            echo "❌ ОШИБКА: сообщение пустое"
            exit 1
          fi
          echo "Отправляем сообщение в чат $CHAT_ID..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP код ответа: $HTTP_CODE"
          echo "Тело ответа Telegram: $BODY"
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Сообщение успешно отправлено!"
          else
            echo "❌ Ошибка отправки. Код: $HTTP_CODE"
            exit 1
          fi

      # ========== СОХРАНЕНИЕ ПЛАНА В РЕПОЗИТОРИЙ ==========
      - name: Сохраняем план в файл
        run: |
          FILENAME="travel_plan_$(date +%Y%m%d_%H%M%S).txt"
          echo "План путешествия в ${{ github.event.inputs.destination }}" > "$FILENAME"
          echo "Длительность: ${{ github.event.inputs.days }} дней" >> "$FILENAME"
          echo "Погода: ${{ steps.weather.outputs.temp }}°C, ${{ steps.weather.outputs.description }}" >> "$FILENAME"
          echo "Бюджет: ${{ steps.budget.outputs.total }} руб" >> "$FILENAME"
          echo "${{ steps.budget.outputs.status }}" >> "$FILENAME"
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add "$FILENAME"
          git commit -m "Добавлен план путешествия в ${{ github.event.inputs.destination }}" || echo "Нет изменений"
          git push || echo "Нечего пушить"