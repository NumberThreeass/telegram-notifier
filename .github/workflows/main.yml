name: Фитнес-трекер

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Генерируем сообщение с ежедневным расписанием
        id: message
        run: |
          # Определяем текущий день недели (пн=1, вт=2, ..., вс=7)
          DOW=$(date +%u)
          case $DOW in
            1) DAY="monday" ;;
            2) DAY="tuesday" ;;
            3) DAY="wednesday" ;;
            4) DAY="thursday" ;;
            5) DAY="friday" ;;
            6) DAY="saturday" ;;
            7) DAY="sunday" ;;
          esac

          # Читаем общие цели
          WATER=$(jq -r '.water_daily_goal_ml // 0' config.json)
          STEPS=$(jq -r '.steps_daily_goal // 0' config.json)
          WEEKLY=$(jq -r '.weekly_goal // 0' config.json)

          MESSAGE="💪 *Фитнес-трекер* — тренировка на $DAY"$'\n'

          # Берём список упражнений на сегодня
          EX_COUNT=$(jq -r ".weekly_workouts.\"$DAY\" // [] | length" config.json)
          if [ "$EX_COUNT" -gt 0 ]; then
            while IFS= read -r exercise; do
              MESSAGE+="• $exercise"$'\n'
            done < <(jq -r ".weekly_workouts.\"$DAY\"[]" config.json)
          else
            MESSAGE+="• Сегодня отдых (активное восстановление)"$'\n'
          fi

          # Вода
          if [ "$WATER" != "0" ]; then
            MESSAGE+=$'\n'
            MESSAGE+="💧 *Водный баланс:* выпить ${WATER} мл"$'\n'
          fi

          # Шаги
          if [ "$STEPS" != "0" ]; then
            MESSAGE+="👟 *Шаги:* пройти ${STEPS} шагов"$'\n'
          fi

          # Цель на неделю
          if [ "$WEEKLY" != "0" ]; then
            MESSAGE+=$'\n'
            MESSAGE+="🎯 Цель на неделю: ${WEEKLY} дней тренировок"
          fi

          # Кодируем в URL-формат
          MESSAGE_ENCODED=$(echo -n "$MESSAGE" | jq -sRr @uri)
          echo "text=$MESSAGE_ENCODED" >> $GITHUB_OUTPUT

      - name: Проверяем secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "Ошибка: TELEGRAM_CHAT_ID не задан"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "Ошибка: TELEGRAM_BOT_TOKEN не задан"
            exit 1
          fi
          echo "secrets_ok=true" >> $GITHUB_OUTPUT

      - name: Отправляем в Telegram
        if: steps.check_secrets.outputs.secrets_ok == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.message.outputs.text }}" \
            -d parse_mode="Markdown"

      - name: Сохраняем историю
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC'): Запуск выполнен" >> history.log
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add history.log
          git commit -m "Обновление истории $(date -u '+%Y-%m-%d %H:%M:%S')" || echo "Нет изменений"
          git push || echo "Не удалось запушить"