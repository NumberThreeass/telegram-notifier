name: Фитнес-трекер

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Читаем config.json
        id: config
        run: |
          echo "project_name=$(jq -r '.project_name' config.json)" >> $GITHUB_OUTPUT
          echo "exercises=$(jq -c '.exercises // []' config.json)" >> $GITHUB_OUTPUT
          echo "water_goal=$(jq -r '.water_daily_goal_ml // 0' config.json)" >> $GITHUB_OUTPUT
          echo "steps_goal=$(jq -r '.steps_daily_goal // 0' config.json)" >> $GITHUB_OUTPUT
          echo "weekly_goal=$(jq -r '.weekly_goal // 0' config.json)" >> $GITHUB_OUTPUT

      - name: Генерируем сообщение (как в таблице)
        id: message
        run: |
          # Заголовок как в примере
          MESSAGE="💪 *Тренировка на сегодня:*%0A"

          # Берём упражнения из JSON и добавляем с маркерами •
          EXERCISES_JSON="${{ steps.config.outputs.exercises }}"
          if [ "$EXERCISES_JSON" != "[]" ]; then
            # Превращаем JSON-массив в строку с переносами
            EXERCISES_LIST=$(echo "$EXERCISES_JSON" | jq -r '.[] | "• " + .')
            # Добавляем каждое упражнение (заменяем \n на %0A для URL)
            echo "$EXERCISES_LIST" | while IFS= read -r line; do
              MESSAGE="${MESSAGE}${line}%0A"
            done
          else
            # Если упражнений нет — показываем привычки из старого поля habits (для совместимости)
            HABITS=$(jq -r '.habits // [] | join(", ")' config.json)
            MESSAGE="${MESSAGE}• Привычки: ${HABITS}%0A"
          fi

          # Добавляем воду и шаги (из ТЗ)
          WATER="${{ steps.config.outputs.water_goal }}"
          STEPS="${{ steps.config.outputs.steps_goal }}"
          if [ "$WATER" != "0" ]; then
            MESSAGE="${MESSAGE}%0A💧 *Водный баланс:* выпить ${WATER} мл%0A"
          fi
          if [ "$STEPS" != "0" ]; then
            MESSAGE="${MESSAGE}👟 *Шаги:* пройти ${STEPS} шагов%0A"
          fi

          # Цель на неделю
          WEEKLY="${{ steps.config.outputs.weekly_goal }}"
          if [ "$WEEKLY" != "0" ]; then
            MESSAGE="${MESSAGE}%0A🎯 Цель на неделю: ${WEEKLY} дней тренировок"
          fi

          echo "text=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Проверяем secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "Ошибка: TELEGRAM_CHAT_ID не задан"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "Ошибка: TELEGRAM_BOT_TOKEN не задан"
            exit 1
          fi
          echo "secrets_ok=true" >> $GITHUB_OUTPUT

      - name: Отправляем в Telegram
        if: steps.check_secrets.outputs.secrets_ok == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.message.outputs.text }}" \
            -d parse_mode="Markdown"

      - name: Сохраняем историю
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC'): Запуск выполнен" >> history.log
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add history.log
          git commit -m "Обновление истории $(date -u '+%Y-%m-%d %H:%M:%S')" || echo "Нет изменений"
          git push || echo "Не удалось запушить"